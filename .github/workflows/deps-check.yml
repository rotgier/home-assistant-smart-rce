name: Deps Check

# Scheduled check dla outdated pip pinów. Failuje gdy pakiet w
# requirements-test.txt ma nowszą wersję dostępną (po wykluczeniu pinów
# constrained przez pytest-homeassistant-custom-component — patrz
# scripts/check_outdated_deps.py).
#
# Workflow weekly, plus manual trigger. NIE jest częścią main CI — nie
# blokuje normalnych pushy. Failure = notification mail z GitHub Actions,
# action: uruchom `scripts/check_outdated_deps.py` lokalnie i bumpuj.

permissions:
  contents: read

on:
  schedule:
    # Każdy poniedziałek 09:00 UTC (11:00 PL latem, 10:00 zimą)
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check-outdated:
    name: Check outdated pip pins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-test.txt
      - name: Check outdated pins
        run: .venv/bin/python scripts/check_outdated_deps.py
