repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=hass,alot,datas,dof,dur,ether,farenheit,hist,iff,ines,ist,lightsensor,mut,nd,pres,referer,ser,serie,te,technik,ue,uint,visability,wan,wanna,withing,iam,incomfort,ba
          - --skip="./.*,*.csv,*.json"
          - --quiet-level=2
        exclude_types: [csv, json]
        exclude: ^(tests/fixtures/|context/logika_baterii\.md$)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      # no-commit-to-branch disabled — single-user repo, direct push to main OK.
      # Re-enable if switching to PR flow:
      # - id: no-commit-to-branch
      #   args: ["--branch", "main"]
      - id: pretty-format-json
        args:
          - --no-sort-keys
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        stages: [manual]
  # mypy enabled — cleanup commit 3e84ef6 (177 → 0 errors).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/mypy
        language: system
        types_or: [python, pyi]
        files: ^custom_components/smart_rce/.+\.py$
        pass_filenames: true
        require_serial: true
      # Manual-only — chodzi tylko via `pre-commit run check-outdated-deps --hook-stage manual`.
      # Scheduled weekly w .github/workflows/deps-check.yml. Verbose żeby
      # zawsze pokazać output (script exit 0, więc pre-commit zatailuje
      # output bez `verbose: true`).
      - id: check-outdated-deps
        name: check outdated pip pins
        entry: .venv/bin/python scripts/check_outdated_deps.py
        language: system
        pass_filenames: false
        stages: [manual]
        verbose: true
