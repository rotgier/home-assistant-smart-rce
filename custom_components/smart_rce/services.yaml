get_weather_table:
  name: Get weather table
  description: >
    Assemble the dashboard weather table for a target date. Returns a row
    per state change (deduplicated) covering past observations from
    recorder + current synthesized hour + future hourly forecast + 15-min
    nowcast slots (when the date is today). Each row carries the 8
    wetteronline sensor fields plus the computed PV multiplier breakdown
    (coverage, heaviness, penalty, multiplier).
  fields:
    date:
      name: Date
      description: ISO date (YYYY-MM-DD) within recorder retention.
      required: true
      example: "2026-05-12"
      selector:
        date:

get_target_soc_matrix:
  name: Get target SOC matrix
  description: >
    Compute the PV × Cons strategy matrix for the 7-13 deficit window on
    a target date. Today returns 8 PV strategies (At6, Live, Extrap +
    five extrapolated variants) × 1 Live cons + up to 5 prev-workday
    cons profiles. Tomorrow returns 2 PV (At6, Live) × the same Cons
    set. Past dates return kind="past_unsupported" (no matrix; v2 will
    add recorder-based reconstruction). Each cell carries required SOC%
    and the cumulative dip in kWh.
  fields:
    date:
      name: Date
      description: ISO date (YYYY-MM-DD). Today or tomorrow; past returns N/A.
      required: true
      example: "2026-05-13"
      selector:
        date:
